<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinula.WASM</title>
    <base href="/" />

    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Pinula.WASM.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        window.setupHorizontalScroll = function () {
            const containers = document.querySelectorAll('.scroll-container');
            console.log("containers for scroll:", containers.length);

            containers.forEach(container => {
                const newWheelHandler = (evt) => {
                    if (evt.deltaY !== 0) {
                        evt.preventDefault();
                        container.scrollLeft += evt.deltaY;
                    }
                };
                container.onwheel = newWheelHandler;
            });
        };
    </script>
</body>
</html>
